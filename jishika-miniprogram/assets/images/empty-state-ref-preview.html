<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>empty state preview</title>
  <style>
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .empty-image { width: 280px; height: 280px; object-fit: contain; margin-bottom: 32px; }
    .empty-title { font-size: 14px; font-weight: 500; color: #374151; }
    .empty-sub { margin-top: 6px; font-size: 12px; font-weight: 400; color: #9CA3AF; text-align: center; }
  </style>
</head>
<body>
  <img class="empty-image" src="empty-state-ref.png" />
  <div class="empty-title">还没有记事卡</div>
  <div class="empty-sub">下拉或点击上方按钮，从聊天记录生成一张记事卡</div>
</body>
</html>
