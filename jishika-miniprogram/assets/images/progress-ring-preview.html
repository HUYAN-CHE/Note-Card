<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>progress ring preview</title>
  <style>
    body { display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: linear-gradient(180deg, #B8F0B0 0%, #7DCE7E 100%); }
    .cta-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
    .cta-pill { position: relative; z-index: 2; display: flex; align-items: center; justify-content: center; gap: 12px; box-sizing: border-box; min-width: 180px; padding: 14px 24px; border-radius: 999px; background: rgba(255,255,255,0.22); border: 1px solid rgba(255,255,255,0.45); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; transition: border-color 0.15s ease; }
    .cta-pill.pulling { border-color: transparent; }
    .progress-ring { position: absolute; z-index: 3; top: 50%; left: 50%; transform: translate(-50%, -50%); overflow: visible; opacity: 1; pointer-events: none; }
    .progress-ring-fill { fill: none; stroke: #fff; stroke-width: 2px; transition: stroke-dasharray 0.05s linear; }
  </style>
</head>
<body>
  <div class="cta-wrap">
    <svg class="progress-ring" width="230" height="48" viewBox="0 0 230 48">
      <path class="progress-ring-fill" d="M 24 1 L 206 1 A 23 23 0 0 1 229 24 A 23 23 0 0 1 206 47 L 24 47 A 23 23 0 0 1 1 24 A 23 23 0 0 1 24 1 Z" stroke-dasharray="305, 508" />
    </svg>
    <div class="cta-pill pulling">+ 下拉新建事项</div>
  </div>
</body>
</html>
